repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.12.5
          - httpx>=0.28.1
          - httpx-ws>=0.9.0
          - email-validator>=2.3.0

  - repo: local
    hooks:
      - id: unit-tests
        name: unit tests
        entry: uv run pytest -m "not integration" -x -q
        language: system
        pass_filenames: false
        always_run: true
